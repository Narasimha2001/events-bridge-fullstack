<div class="container fade-in">

  <div class="header-section text-center mb-5">
    <h1>Upcoming Events</h1>
    <p class="text-muted">Discover what's happening on campus</p>
  </div>

  <app-event-search-bar (filterChange)="onFilterChange($event)"></app-event-search-bar>

  <div *ngIf="isLoading" class="d-flex justify-content-center p-5">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div *ngIf="!isLoading && events.length === 0" class="text-center p-5">
    <mat-icon class="large-icon text-muted">event_busy</mat-icon>
    <h3>No upcoming events</h3>
    <p class="text-muted">Check back later!</p>
  </div>

  <div class="event-grid" *ngIf="!isLoading && events.length > 0">
    <mat-card *ngFor="let event of events" class="event-card hover-lift">

      <div class="event-banner"
        [style.background-image]="event.bannerImageUrl ? 'url(' + event.bannerImageUrl + ')' : ''">
        <div class="date-badge">
          <span class="day">{{ event.startTime | date:'dd' }}</span>
          <span class="month">{{ event.startTime | date:'MMM' }}</span>
        </div>
      </div>

      <mat-card-content class="p-3">
        <h3 class="event-title">{{ event.title }}</h3>
        <div class="event-meta">
          <mat-icon>location_on</mat-icon> <span>{{ event.location }}</span>
        </div>
        <div class="event-meta">
          <mat-icon>schedule</mat-icon> <span>{{ event.startTime | date:'shortTime' }}</span>
        </div>
      </mat-card-content>

      <mat-card-actions class="p-3 pt-0">
        <button mat-stroked-button color="primary" class="w-100" [routerLink]="['/public/event', event.eventId]"> View
          Details
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
