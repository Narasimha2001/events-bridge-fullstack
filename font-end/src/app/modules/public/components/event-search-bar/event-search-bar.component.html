<div class="search-wrapper">
  <div class="search-card">
    
    <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
      <mat-label>Search events...</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="keyword" (keyup.enter)="onSearch()" placeholder="Title, location, etc.">
      <button *ngIf="keyword" matSuffix mat-icon-button aria-label="Clear" (click)="keyword=''">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field appearance="outline" class="date-field" subscriptSizing="dynamic">
      <mat-label>Date Range</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input matStartDate [(ngModel)]="startDate" placeholder="Start">
        <input matEndDate [(ngModel)]="endDate" placeholder="End">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>

    <div class="actions">
      <button mat-flat-button color="primary" (click)="onSearch()">Find</button>
      <button mat-stroked-button (click)="clearFilters()">Clear</button>
    </div>

  </div>
</div>
