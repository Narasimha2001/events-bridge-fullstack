<div class="register-container fade-in">
  <mat-card class="register-card">
    
    <div class="header-section">
      <h1>Create Account</h1>
      <p>Join EventsBridge today</p>
    </div>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group role-container">
          <label>I AM A:</label>
          <mat-button-toggle-group formControlName="roleName" class="w-100 role-group">
            <mat-button-toggle value="STUDENT">Student</mat-button-toggle>
            <mat-button-toggle value="ORGANIZER">Organizer</mat-button-toggle>
          </mat-button-toggle-group>
        </div>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" placeholder="Ex. John Doe">
          <mat-icon matSuffix>person_outline</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="name@college.edu">
          <mat-icon matSuffix>mail_outline</mat-icon>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
            Please enter a valid email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-icon matSuffix>lock_outline</mat-icon>
          <mat-hint align="end">Min 8 chars</mat-hint>
        </mat-form-field>

        <div class="action-section">
          <button mat-raised-button color="primary" class="submit-btn" 
                  type="submit" [disabled]="registerForm.invalid || isLoading">
            <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
            <span *ngIf="!isLoading">Sign Up</span>
            <span *ngIf="isLoading" style="margin-left: 8px;">Creating...</span>
          </button>
        </div>

      </form>
    </mat-card-content>

    <mat-card-footer class="footer-section">
      <span>Already have an account? </span>
      <a routerLink="/auth/login">Log in</a>
    </mat-card-footer>
  </mat-card>
</div>
