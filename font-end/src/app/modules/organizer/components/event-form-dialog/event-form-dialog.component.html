<h2 mat-dialog-title>{{ isEditMode ? 'Edit Event' : 'Create New Event' }}</h2>

<mat-dialog-content>
  <form [formGroup]="eventForm" class="event-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Event Title</mat-label>
      <input matInput formControlName="title" placeholder="Ex. Annual Tech Symposium">
      <mat-error *ngIf="eventForm.get('title')?.hasError('required')">
        Title is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" placeholder="What is this event about?"></textarea>
      <mat-error *ngIf="eventForm.get('description')?.hasError('required')">
        Description is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" placeholder="Ex. Main Auditorium">
      <mat-error *ngIf="eventForm.get('location')?.hasError('required')">
        Location is required
      </mat-error>
    </mat-form-field>



     <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Start Date & Time</mat-label>
        <input matInput [ngxMatDatetimePicker]="startPicker" formControlName="startTime" (click)="startPicker.open()" readonly>
        <ngx-mat-datepicker-toggle matSuffix [for]="startPicker"></ngx-mat-datepicker-toggle>
        <ngx-mat-datetime-picker #startPicker [showSpinners]="true" [showSeconds]="false"></ngx-mat-datetime-picker>
         <mat-error *ngIf="eventForm.get('startTime')?.hasError('required')">
          Start time is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>End Date & Time</mat-label>
        <input matInput [ngxMatDatetimePicker]="endPicker" formControlName="endTime" (click)="endPicker.open()" readonly>
        <ngx-mat-datepicker-toggle matSuffix [for]="endPicker"></ngx-mat-datepicker-toggle>
        <ngx-mat-datetime-picker #endPicker [showSpinners]="true" [showSeconds]="false"></ngx-mat-datetime-picker>
      </mat-form-field>
    </div>

    <!-- <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Start Date & Time</mat-label>
        <input matInput type="datetime-local" formControlName="startTime">
        <mat-error *ngIf="eventForm.get('startTime')?.hasError('required')">
          Start time is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>End Date & Time</mat-label>
        <input matInput type="datetime-local" formControlName="endTime">
        <mat-error *ngIf="eventForm.get('endTime')?.hasError('required')">
          End time is required
        </mat-error>
      </mat-form-field>
    </div> -->

    <mat-form-field appearance="outline" class="half-width">
      <mat-label>Max Capacity</mat-label>
      <input matInput type="number" formControlName="capacity" min="1">
      <mat-error *ngIf="eventForm.get('capacity')?.hasError('min')">
        Capacity must be at least 1
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>Cancel</button>
  
  <button mat-raised-button color="primary" 
          [disabled]="eventForm.invalid" 
          (click)="onSubmit()">
    {{ isEditMode ? 'Update Event' : 'Create Event' }}
  </button>
</mat-dialog-actions>
