spring.application.name=events-bridge

# DATABASE CONFIGURATION (Now dynamic)
# pass DB_URL, DB_USERNAME, and DB_PASSWORD variables from Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# SECURITY (JWT)
jwt.secret=${JWT_SECRET}
jwt.access_token.expiration=${JWT_ACCESS_EXPIRATION:15}
jwt.refresh_token.expiration=${JWT_REFRESH_EXPIRATION:1440}

# EMAIL (Mailtrap / Production Mailer)
spring.mail.debug=true
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}