<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration Confirmed</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #3f51b5; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px; color: #333; line-height: 1.6; }
        .event-box { background-color: #eef2ff; padding: 15px; border-left: 4px solid #3f51b5; margin: 20px 0; border-radius: 4px; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registration Confirmed!</h1>
        </div>
        <div class="content">
            <p>Hello <strong th:text="${studentName}">Student</strong>,</p>
            
            <p>You have successfully registered for the following event:</p>
            
            <div class="event-box">
                <h3 th:text="${eventTitle}">Event Title</h3>
                <p><strong>Date:</strong> <span th:text="${eventDate}">Date</span></p>
                <p><strong>Location:</strong> <span th:text="${eventLocation}">Location</span></p>
            </div>

            <p>Your digital ticket is available in your dashboard. We look forward to seeing you there!</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 EventsBridge. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
